name: lumem
description: Dream Share - Rede social de sonhos.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^8.0.2
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.3.2

  # HTTP & API
  dio: ^5.4.0
  flutter_secure_storage: ^10.0.0

  # State Management & Persistence
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Alarms & Notifications
  flutter_local_notifications: ^17.1.1
  android_alarm_manager_plus: ^5.0.0
  audioplayers: ^6.0.0
  file_picker: ^8.0.0

  # UI & Media
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  timeago: ^3.6.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - .env
