name: 🚦 Quality Gate (Catraca) — Lumem

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Permissões necessárias para o bot comentar nos PRs
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Backend Python (Django + pytest + flake8)
  # ─────────────────────────────────────────────────────────────
  backend-quality:
    name: 🐍 Backend Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: 📦 Instalar dependências Python
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pip-audit

      # Cria a pasta ANTES de qualquer ferramenta tentar escrever nela
      - name: 📁 Criar pasta de relatórios
        run: mkdir -p .quality-reports

      - name: 🔒 pip-audit (vulnerabilidades Python)
        working-directory: ./backend
        run: pip-audit --format json --output ../.quality-reports/pip-audit.json || true

      - name: 🔍 Flake8 (linting Python)
        working-directory: ./backend
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.venv,migrations,__pycache__ \
            --output-file=../.quality-reports/flake8.txt || true

      - name: 🧪 pytest + coverage
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: dreamshare_backend.settings
          SECRET_KEY: ci-only-fake-secret-key-not-for-production
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          coverage run -m pytest --tb=short -q || true
          coverage json -o ../.quality-reports/python-coverage.json || true

      - name: 🔎 Listar relatórios gerados (debug)
        run: ls -la .quality-reports/ || echo "Pasta vazia ou inexistente"

      - name: 📤 Upload relatórios backend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-quality-reports
          path: .quality-reports/
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Frontend React (ESLint + Jest + jscpd)
  # ─────────────────────────────────────────────────────────────
  frontend-quality:
    name: ⚛️ Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Instalar dependências JS
        working-directory: ./frontend
        # legacy-peer-deps necessário: react-scripts@5 não suporta TypeScript 5.x
        run: npm install --legacy-peer-deps

      # Cria a pasta ANTES de qualquer ferramenta tentar escrever nela
      - name: 📁 Criar pasta de relatórios
        run: mkdir -p .quality-reports

      - name: 🔒 npm audit (vulnerabilidades JS)
        working-directory: ./frontend
        run: npm audit --json > ../.quality-reports/npm-audit.json || true

      - name: 🔍 ESLint (linting JS/JSX)
        working-directory: ./frontend
        run: |
          npx eslint src \
            --format json \
            --output-file ../.quality-reports/eslint.json \
            --ext .js,.jsx || true

      - name: 🔁 jscpd (duplicação de código)
        working-directory: ./frontend
        run: |
          npx jscpd src \
            --reporters json \
            --output ../.quality-reports \
            --ignore "**/node_modules/**,**/build/**" \
            --min-lines 5 \
            --min-tokens 50 || true

      - name: 🧪 Jest (testes + coverage)
        working-directory: ./frontend
        run: |
          CI=true npm test -- \
            --coverage \
            --coverageReporters=json-summary \
            --coverageDirectory=../.quality-reports/jest-coverage \
            --passWithNoTests || true

      - name: 🔎 Listar relatórios gerados (debug)
        run: ls -la .quality-reports/ || echo "Pasta vazia ou inexistente"

      - name: 📤 Upload relatórios frontend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-quality-reports
          path: .quality-reports/
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Quality Gate — A Catraca
  # ─────────────────────────────────────────────────────────────
  quality-gate:
    name: 🚦 Quality Gate (Catraca)
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    if: always()

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📁 Criar pasta de relatórios
        run: mkdir -p .quality-reports

      - name: 📥 Download relatórios backend
        uses: actions/download-artifact@v4
        with:
          name: backend-quality-reports
          path: .quality-reports/
        continue-on-error: true

      - name: 📥 Download relatórios frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-quality-reports
          path: .quality-reports/
        continue-on-error: true

      - name: 🔎 Listar relatórios baixados (debug)
        run: ls -la .quality-reports/ || echo "Pasta vazia"

      - name: 🚦 Executar Quality Gate
        id: gate
        run: node scripts/quality-gate.js

      - name: 💬 Comentar resultado no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.quality-reports/gate-summary.md';

            if (!fs.existsSync(reportPath)) {
              console.log('Relatório não encontrado, pulando comentário.');
              return;
            }

            const body = fs.readFileSync(reportPath, 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🚦 Quality Gate — Lumem')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: 📋 Publicar no Step Summary
        if: always()
        run: |
          if [ -f .quality-reports/gate-summary.md ]; then
            cat .quality-reports/gate-summary.md >> $GITHUB_STEP_SUMMARY
          fi
