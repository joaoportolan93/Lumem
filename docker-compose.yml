services:
  # ==========================================
  # Backend Django/DRF
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - backend_media:/app/media

volumes:
  backend_media:
