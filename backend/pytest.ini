[pytest]
# Diz ao pytest-django qual settings usar.
# Sem isso, o pytest não consegue descobrir os testes Django.
DJANGO_SETTINGS_MODULE = dreamshare_backend.settings

# Pasta onde estão os testes
testpaths = core

# Padrão de descoberta de arquivos de teste
python_files = tests*.py test_*.py
python_classes = Test*
python_functions = test_*

# Suprime avisos irrelevantes durante os testes
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Permite que os testes acessem o banco de dados por padrão
# (sem isso, os testes que usam @pytest.mark.django_db falham)
addopts = --tb=short -q
